services:
  jenkins:
    build: .
    container_name: jenkins
    user: root
    ports:
      - "8090:8080"    # UI Jenkins — http://localhost:8090
      - "50000:50000"  # Puerto para agentes Jenkins
    volumes:
      - jenkins_home:/var/jenkins_home

      # ── macOS con Docker Desktop / Linux genérico / Windows WSL2 ────
      # Docker Desktop en macOS expone /var/run/docker.sock dentro de la VM.
      # Esta ruta también funciona en Linux nativo y Windows con WSL2 backend.
      - /var/run/docker.sock:/var/run/docker.sock

      # ── macOS Docker Desktop (socket por usuario — solo si el anterior falla) ──
      # Si Docker Desktop está configurado con socket de usuario específico,
      # comentar la línea anterior y descomentar esta (ajustar "David" al usuario):
      # - /Users/David/.docker/run/docker.sock:/var/run/docker.sock

      # ── Windows con WSL2 backend ──────────────────────────────────
      # (descomentar y comentar la línea de macOS de arriba)
      # - /var/run/docker.sock:/var/run/docker.sock

      # ── Windows con Hyper-V backend ────────────────────────────────
      # (descomentar y comentar la línea de macOS de arriba)
      # - \\.\pipe\docker_engine:\\.\pipe\docker_engine

volumes:
  jenkins_home:

services:
  dockerbdfestivos:
    image: mongo:7
    container_name: dockerbdfestivos
    environment:
      MONGO_INITDB_DATABASE: festivos_db
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - redcalendario
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  dockerbdcalendario:
    image: postgres:16
    container_name: dockerbdcalendario
    environment:
      POSTGRES_DB: calendario_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - redcalendario
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendario_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  dockerapifestivos:
    build: ./validate_holydays_ms
    image: apifestivos:1.0
    container_name: dockerapifestivos
    environment:
      PORT: "8080"
      MONGODB_URI: "mongodb://admin:password123@dockerbdfestivos:27017/festivos_db?authSource=admin"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      dockerbdfestivos:
        condition: service_healthy
    networks:
      - redcalendario

  dockerapicalendario:
    build: ./consume_holidays_ms
    image: apicalendario:1.0
    container_name: dockerapicalendario
    environment:
      DB_URL: "jdbc:postgresql://dockerbdcalendario:5432/calendario_db"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      MS1_BASE_URL: "http://dockerapifestivos:8080"
    ports:
      - "8082:8082"
    depends_on:
      dockerbdcalendario:
        condition: service_healthy
      dockerapifestivos:
        condition: service_healthy
    networks:
      - redcalendario

volumes:
  mongodb_data:
  postgres_data:

networks:
  redcalendario:
    name: redcalendario
    driver: bridge
